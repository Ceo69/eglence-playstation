<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eğlence Playstation Menü</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(0,234,255,.18), transparent 35%),
        radial-gradient(circle at top right, rgba(150,0,255,.18), transparent 35%),
        #07070d;
    color: white;
    padding-bottom: 90px;
}

header {
    padding: 24px 16px 18px;
    background: linear-gradient(135deg, #050505, #101033);
    border-bottom: 1px solid rgba(0,234,255,.45);
}

header h1 {
    margin: 0;
    color: #00eaff;
    font-size: 24px;
}

header p {
    margin: 7px 0 0;
    color: #cfcfcf;
    font-size: 14px;
}

.search-box {
    padding: 12px;
}

.search-box input {
    width: 100%;
    padding: 13px 14px;
    border-radius: 15px;
    border: 1px solid rgba(0,234,255,.45);
    background: rgba(255,255,255,.08);
    color: white;
    outline: none;
    font-size: 15px;
}

.search-box input::placeholder {
    color: #aaa;
}

.tabs {
    display: flex;
    gap: 10px;
    padding: 0 12px 12px;
    position: sticky;
    top: 0;
    background: rgba(7,7,13,.95);
    z-index: 5;
}

.tab {
    flex: 1;
    padding: 12px;
    border-radius: 14px;
    border: 1px solid #00eaff;
    background: #151522;
    color: white;
    font-weight: bold;
}

.tab.active {
    background: #00eaff;
    color: #000;
}

.section-toggle {
    width: calc(100% - 24px);
    margin: 10px 12px 4px;
    padding: 14px;
    border-radius: 16px;
    border: 1px solid rgba(0,234,255,.35);
    background: rgba(23,23,36,.9);
    color: white;
    font-size: 16px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.hidden {
    display: none !important;
}
    
.section-title {
    padding: 0 12px;
    margin: 10px 0 4px;
    color: #00eaff;
    font-size: 17px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 12px;
}

.card {
    position: relative;
    background: rgba(23,23,36,.88);
    border: 1px solid rgba(0,234,255,.16);
    border-radius: 17px;
    overflow: hidden;
    box-shadow: 0 0 18px rgba(0,234,255,.06);
}

.card img {
    width: 100%;
    height: 82px;
    object-fit: contain;
    background: #fff;
    padding: 8px;
}

.card-body {
    padding: 9px;
}

.card h3 {
    margin: 0 0 6px;
    font-size: 13px;
    min-height: 32px;
}

.price {
    color: #00eaff;
    font-weight: bold;
    font-size: 13px;
    margin-bottom: 8px;
}

.card button {
    width: 100%;
    background: #00eaff;
    color: #000;
    border: none;
    padding: 9px;
    border-radius: 10px;
    font-weight: bold;
    font-size: 12px;
}

.badge {
    position: absolute;
    top: 7px;
    left: 7px;
    background: #ffcc00;
    color: #000;
    font-size: 10px;
    font-weight: bold;
    padding: 4px 6px;
    border-radius: 8px;
    z-index: 2;
}

.badge.sale {
    background: #ff3b3b;
    color: #fff;
}

.cart-float {
    position: fixed;
    right: 14px;
    bottom: 14px;
    background: #00eaff;
    color: #000;
    border: none;
    padding: 14px 18px;
    border-radius: 999px;
    font-weight: bold;
    box-shadow: 0 0 25px rgba(0,234,255,.4);
    z-index: 20;
}

.overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 25;
}

.overlay.show {
    display: block;
}

.cart-panel {
    position: fixed;
    top: 0;
    right: -100%;
    width: 88%;
    max-width: 390px;
    height: 100%;
    background: #080811;
    border-left: 2px solid #00eaff;
    z-index: 30;
    transition: .25s;
    padding: 15px;
    display: flex;
    flex-direction: column;
}

.cart-panel.open {
    right: 0;
}

.cart-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.close-btn {
    background: #222;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 8px 11px;
}

.cart-items {
    flex: 1;
    overflow-y: auto;
    margin: 15px 0;
}

.cart-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #222;
}

.cart-controls {
    display: flex;
    gap: 5px;
    align-items: center;
}

.cart-controls button {
    width: 30px;
    height: 30px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    background: #1f1f2e;
    color: white;
}

.cart-controls .delete {
    background: #ff3b3b;
}

.send-btn {
    width: 100%;
    background: #00eaff;
    color: #000;
    border: none;
    padding: 13px;
    border-radius: 13px;
    font-weight: bold;
}

.send-btn:disabled {
    background: #333;
    color: #888;
}

.clear-btn {
    width: 100%;
    background: #292929;
    color: white;
    border: none;
    padding: 11px;
    border-radius: 13px;
    font-weight: bold;
    margin-top: 8px;
}

.empty {
    color: #aaa;
    font-size: 14px;
}
</style>
</head>

<body>

<header>
    <h1>🎮 Eğlence Playstation</h1>
    <p>Ürünleri seç, sepete ekle, WhatsApp ile sipariş gönder.</p>
</header>

<div class="search-box">
    <input type="text" id="arama" placeholder="Ürün ara..." oninput="urunleriGoster()">
</div>

<div class="tabs">
    <button class="tab active" onclick="kategoriSec('İçecekler', this)">🥤 İçecekler</button>
    <button class="tab" onclick="kategoriSec('Yiyecekler', this)">🍔 Yiyecekler</button>
</div>

<button class="section-toggle" onclick="cokSatanToggle()">
    <span>🔥 Çok Satanlar</span>
    <span id="cokSatanOk">▼</span>
</button>

<div class="grid hidden" id="cokSatanAlani"></div>

<h2 class="section-title" id="kategoriBaslik">🥤 İçecekler</h2>
<div class="grid" id="urunAlani"></div>

<button class="cart-float" onclick="sepetiAc()">🛒 Sepet <span id="sepetAdet">0</span></button>

<div class="overlay" id="overlay" onclick="sepetiKapat()"></div>

<div class="cart-panel" id="cartPanel">
    <div class="cart-head">
        <h2>🛒 Sepet</h2>
        <button class="close-btn" onclick="sepetiKapat()">Kapat</button>
    </div>

    <div class="cart-items" id="sepetListesi">
        <span class="empty">Sepet boş</span>
    </div>

    <button id="siparisBtn" class="send-btn" onclick="siparisGonder()" disabled>Siparişi Gönder</button>
    <button class="clear-btn" onclick="sepetiTemizle()">Sepeti Temizle</button>
</div>

<script>
const whatsappNumara = "905423948645";

const urunler = [
    { id: 1, ad: "Su", dosya: "su", fiyat: 15, kategori: "İçecekler", stok: true, yeni: false, kampanya: false, cokSatan: false },
    { id: 2, ad: "Pepsi Cam Şişe", dosya: "pepsi", fiyat: 50, kategori: "İçecekler", stok: true, yeni: false, kampanya: false, cokSatan: true },
    { id: 3, ad: "Pepsi Kutu", dosya: "pepsi-kutu", fiyat: 50, kategori: "İçecekler", stok: true, yeni: false, kampanya: true, cokSatan: false },
    { id: 4, ad: "7UP", dosya: "7up", fiyat: 50, kategori: "İçecekler", stok: true, yeni: false, kampanya: false, cokSatan: true },
    { id: 5, ad: "Yedigün", dosya: "yedigun", fiyat: 50, kategori: "İçecekler", stok: true, yeni: false, kampanya: false, cokSatan: false },
    { id: 6, ad: "Lipton Ice Tea", dosya: "lipton", fiyat: 50, kategori: "İçecekler", stok: true, yeni: false, kampanya: false, cokSatan: true },
    { id: 7, ad: "Tropicana", dosya: "tropicana", fiyat: 50, kategori: "İçecekler", stok: true, yeni: false, kampanya: false, cokSatan: false },
    { id: 8, ad: "Maden Suyu", dosya: "maden-suyu", fiyat: 30, kategori: "İçecekler", stok: true, yeni: false, kampanya: false, cokSatan: false },
    { id: 9, ad: "Tost", dosya: "tost", fiyat: 100, kategori: "Yiyecekler", stok: true, yeni: false, kampanya: false, cokSatan: true },
    { id: 10, ad: "Sufle", dosya: "sufle", fiyat: 100, kategori: "Yiyecekler", stok: true, yeni: true, kampanya: false, cokSatan: false }
];

let aktifKategori = "İçecekler";
let sepet = [];
let cokSatanlarAcik = false;

function kartHtml(urun) {
    let rozet = "";

    if (urun.kampanya) {
        rozet = `<div class="badge sale">Kampanya</div>`;
    } else if (urun.yeni) {
        rozet = `<div class="badge">Yeni</div>`;
    }

    return `
        <div class="card">
            ${rozet}
            <img src="images/${urun.dosya}.png" alt="${urun.ad}">
            <div class="card-body">
                <h3>${urun.ad}</h3>
                <div class="price">${urun.fiyat} TL</div>
                <button onclick="sepeteEkle(${urun.id})">Ekle</button>
            </div>
        </div>
    `;
}

function urunleriGoster() {
    const arama = document.getElementById("arama").value.toLowerCase();
    const urunAlani = document.getElementById("urunAlani");
    const cokSatanAlani = document.getElementById("cokSatanAlani");
    const bolumBaslik = document.getElementById("bolumBaslik");

    const filtreliUrunler = urunler.filter(urun =>
        urun.stok &&
        urun.kategori === aktifKategori &&
        urun.ad.toLowerCase().includes(arama)
    );

    const cokSatanlar = urunler.filter(urun =>
        urun.stok &&
        urun.cokSatan &&
        urun.ad.toLowerCase().includes(arama)
    );

    urunAlani.innerHTML = filtreliUrunler.map(kartHtml).join("");

  if (cokSatanlar.length > 0 && arama === "" && cokSatanlarAcik) {
    cokSatanAlani.classList.remove("hidden");
    cokSatanAlani.innerHTML = cokSatanlar.map(kartHtml).join("");
} else {
    cokSatanAlani.classList.add("hidden");
}
}

function cokSatanToggle() {
    cokSatanlarAcik = !cokSatanlarAcik;

    document.getElementById("cokSatanOk").innerText = cokSatanlarAcik ? "▲" : "▼";
 
    
    urunleriGoster();
}

function sepeteEkle(id) {
    const urun = urunler.find(item => item.id === id);
    const mevcut = sepet.find(item => item.id === id);

    if (mevcut) {
        mevcut.adet += 1;
    } else {
        sepet.push({ ...urun, adet: 1 });
    }

    sepetiGuncelle();
}

function adetArtir(id) {
    const urun = sepet.find(item => item.id === id);
    if (urun) urun.adet += 1;
    sepetiGuncelle();
}

function adetAzalt(id) {
    const urun = sepet.find(item => item.id === id);
    if (!urun) return;

    urun.adet -= 1;

    if (urun.adet <= 0) {
        sepet = sepet.filter(item => item.id !== id);
    }

    sepetiGuncelle();
}

function urunSil(id) {
    sepet = sepet.filter(item => item.id !== id);
    sepetiGuncelle();
}

function sepetiGuncelle() {
    const liste = document.getElementById("sepetListesi");
    const siparisBtn = document.getElementById("siparisBtn");
    const sepetAdet = document.getElementById("sepetAdet");

    const toplamAdet = sepet.reduce((toplam, item) => toplam + item.adet, 0);
    sepetAdet.innerText = toplamAdet;

    if (sepet.length === 0) {
        liste.innerHTML = '<span class="empty">Sepet boş</span>';
        siparisBtn.disabled = true;
        return;
    }

    liste.innerHTML = "";

    sepet.forEach(item => {
        liste.innerHTML += `
            <div class="cart-row">
                <div>${item.adet} × ${item.ad}</div>
                <div class="cart-controls">
                    <button onclick="adetAzalt(${item.id})">−</button>
                    <button onclick="adetArtir(${item.id})">+</button>
                    <button class="delete" onclick="urunSil(${item.id})">×</button>
                </div>
            </div>
        `;
    });

    siparisBtn.disabled = false;
}

function sepetiTemizle() {
    sepet = [];
    sepetiGuncelle();
}

function sepetiAc() {
    document.getElementById("cartPanel").classList.add("open");
    document.getElementById("overlay").classList.add("show");
}

function sepetiKapat() {
    document.getElementById("cartPanel").classList.remove("open");
    document.getElementById("overlay").classList.remove("show");
}

function siparisGonder() {
    if (sepet.length === 0) return;

    let mesaj = "Merhaba, sipariş vermek istiyorum.%0A%0A";
    mesaj += "Sipariş:%0A";

    sepet.forEach(item => {
        mesaj += `- ${item.adet} x ${item.ad}%0A`;
    });

    window.location.href = `https://wa.me/${whatsappNumara}?text=${mesaj}`;
}

urunleriGoster();
sepetiGuncelle();
</script>

</body>
</html>
