<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eğlence Playstation Menü</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #12123a, #07070d 55%);
    color: white;
    padding-bottom: 190px;
}

header {
    padding: 22px 16px;
    background: linear-gradient(135deg, #050505, #111144);
    border-bottom: 1px solid #00eaff;
}

header h1 {
    margin: 0;
    color: #00eaff;
    font-size: 24px;
}

header p {
    margin: 6px 0 0;
    color: #cfcfcf;
    font-size: 14px;
}

.tabs {
    display: flex;
    gap: 10px;
    padding: 12px;
    position: sticky;
    top: 0;
    background: #090912;
    z-index: 5;
}

.tab {
    flex: 1;
    padding: 12px;
    border-radius: 14px;
    border: 1px solid #00eaff;
    background: #151522;
    color: white;
    font-weight: bold;
}

.tab.active {
    background: #00eaff;
    color: #000;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 12px;
}

.card {
    position: relative;
    background: #171724;
    border: 1px solid #292945;
    border-radius: 16px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 82px;
    object-fit: contain;
    background: #fff;
    padding: 8px;
}

.card-body {
    padding: 9px;
}

.card h3 {
    margin: 0 0 6px;
    font-size: 13px;
    min-height: 32px;
}

.price {
    color: #00eaff;
    font-weight: bold;
    font-size: 13px;
    margin-bottom: 8px;
}

.card button {
    width: 100%;
    background: #00eaff;
    color: #000;
    border: none;
    padding: 9px;
    border-radius: 10px;
    font-weight: bold;
    font-size: 12px;
}

.badge {
    position: absolute;
    top: 7px;
    left: 7px;
    background: #ffcc00;
    color: #000;
    font-size: 10px;
    font-weight: bold;
    padding: 4px 6px;
    border-radius: 8px;
}

.badge.sale {
    background: #ff3b3b;
    color: #fff;
}

.cart {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: #050505;
    border-top: 2px solid #00eaff;
    padding: 12px;
    z-index: 10;
}

.cart-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
}

.cart-items {
    max-height: 115px;
    overflow-y: auto;
    margin-bottom: 10px;
    color: #ddd;
    font-size: 14px;
}

.cart-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid #222;
}

.cart-controls {
    display: flex;
    gap: 5px;
    align-items: center;
}

.cart-controls button {
    width: 28px;
    height: 28px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    background: #1f1f2e;
    color: white;
}

.cart-controls .delete {
    background: #ff3b3b;
}

.send-btn {
    width: 100%;
    background: #00eaff;
    color: #000;
    border: none;
    padding: 11px;
    border-radius: 12px;
    font-weight: bold;
}

.send-btn:disabled {
    background: #333;
    color: #888;
}

.clear-btn {
    width: 100%;
    background: #292929;
    color: white;
    border: none;
    padding: 9px;
    border-radius: 12px;
    font-weight: bold;
    margin-top: 8px;
}

.empty {
    color: #aaa;
}
</style>
</head>

<body>

<header>
    <h1>🎮 Eğlence Playstation</h1>
    <p>Ürünleri seç, sepete ekle, WhatsApp ile sipariş gönder.</p>
</header>

<div class="tabs">
    <button class="tab active" onclick="kategoriSec('İçecekler', this)">🥤 İçecekler</button>
    <button class="tab" onclick="kategoriSec('Yiyecekler', this)">🍔 Yiyecekler</button>
</div>

<div class="grid" id="urunAlani"></div>

<div class="cart">
    <div class="cart-head">
        <strong>🛒 Sepet</strong>
        <strong><span id="toplam">0</span> TL</strong>
    </div>

    <div class="cart-items" id="sepetListesi">
        <span class="empty">Sepet boş</span>
    </div>

    <button id="siparisBtn" class="send-btn" onclick="siparisGonder()" disabled>Siparişi Gönder</button>
    <button class="clear-btn" onclick="sepetiTemizle()">Sepeti Temizle</button>
</div>

<script>
const whatsappNumara = "905423948645";

const urunler = [
    { id: 1, ad: "Su", dosya: "su", fiyat: 15, kategori: "İçecekler", stok: true, yeni: false, kampanya: false },
    { id: 2, ad: "Pepsi Cam Şişe", dosya: "pepsi", fiyat: 50, kategori: "İçecekler", stok: true, yeni: false, kampanya: false },
    { id: 3, ad: "Pepsi Kutu", dosya: "pepsi-kutu", fiyat: 50, kategori: "İçecekler", stok: true, yeni: false, kampanya: false },
    { id: 4, ad: "7UP", dosya: "7up", fiyat: 50, kategori: "İçecekler", stok: true, yeni: false, kampanya: false },
    { id: 5, ad: "Yedigün", dosya: "yedigun", fiyat: 50, kategori: "İçecekler", stok: true, yeni: false, kampanya: false },
    { id: 6, ad: "Lipton Ice Tea", dosya: "lipton", fiyat: 50, kategori: "İçecekler", stok: true, yeni: false, kampanya: false },
    { id: 7, ad: "Tropicana", dosya: "tropicana", fiyat: 50, kategori: "İçecekler", stok: true, yeni: false, kampanya: false },
    { id: 8, ad: "Maden Suyu", dosya: "maden-suyu", fiyat: 30, kategori: "İçecekler", stok: true, yeni: false, kampanya: false },
    { id: 9, ad: "Tost", dosya: "tost", fiyat: 100, kategori: "Yiyecekler", stok: true, yeni: false, kampanya: false },
    { id: 10, ad: "Sufle", dosya: "sufle", fiyat: 100, kategori: "Yiyecekler", stok: true, yeni: true, kampanya: false }
];

let aktifKategori = "İçecekler";
let sepet = [];

function urunleriGoster() {
    const alan = document.getElementById("urunAlani");
    alan.innerHTML = "";

    urunler
        .filter(urun => urun.kategori === aktifKategori && urun.stok === true)
        .forEach(urun => {
            let rozet = "";

            if (urun.kampanya) {
                rozet = `<div class="badge sale">Kampanya</div>`;
            } else if (urun.yeni) {
                rozet = `<div class="badge">Yeni</div>`;
            }

            alan.innerHTML += `
                <div class="card">
                    ${rozet}
                    <img src="images/${urun.dosya}.png" alt="${urun.ad}">
                    <div class="card-body">
                        <h3>${urun.ad}</h3>
                        <div class="price">${urun.fiyat} TL</div>
                        <button onclick="sepeteEkle(${urun.id})">Ekle</button>
                    </div>
                </div>
            `;
        });
}

function kategoriSec(kategori, buton) {
    aktifKategori = kategori;

    document.querySelectorAll(".tab").forEach(btn => btn.classList.remove("active"));
    buton.classList.add("active");

    urunleriGoster();
}

function sepeteEkle(id) {
    const urun = urunler.find(item => item.id === id);
    const mevcut = sepet.find(item => item.id === id);

    if (mevcut) {
        mevcut.adet += 1;
    } else {
        sepet.push({ ...urun, adet: 1 });
    }

    sepetiGuncelle();
}

function adetArtir(id) {
    const urun = sepet.find(item => item.id === id);
    if (urun) urun.adet += 1;
    sepetiGuncelle();
}

function adetAzalt(id) {
    const urun = sepet.find(item => item.id === id);

    if (!urun) return;

    urun.adet -= 1;

    if (urun.adet <= 0) {
        sepet = sepet.filter(item => item.id !== id);
    }

    sepetiGuncelle();
}

function urunSil(id) {
    sepet = sepet.filter(item => item.id !== id);
    sepetiGuncelle();
}

function sepetiGuncelle() {
    const liste = document.getElementById("sepetListesi");
    const toplamAlan = document.getElementById("toplam");
    const siparisBtn = document.getElementById("siparisBtn");

    if (sepet.length === 0) {
        liste.innerHTML = '<span class="empty">Sepet boş</span>';
        toplamAlan.innerText = 0;
        siparisBtn.disabled = true;
        return;
    }

    let toplam = 0;
    liste.innerHTML = "";

    sepet.forEach(item => {
        toplam += item.fiyat * item.adet;

        liste.innerHTML += `
            <div class="cart-row">
                <div>${item.adet} × ${item.ad}</div>
                <div class="cart-controls">
                    <button onclick="adetAzalt(${item.id})">−</button>
                    <button onclick="adetArtir(${item.id})">+</button>
                    <button class="delete" onclick="urunSil(${item.id})">×</button>
                </div>
            </div>
        `;
    });

    toplamAlan.innerText = toplam;
    siparisBtn.disabled = false;
}

function sepetiTemizle() {
    sepet = [];
    sepetiGuncelle();
}

function siparisGonder() {
    if (sepet.length === 0) return;

    let mesaj = "Merhaba, sipariş vermek istiyorum.%0A%0A";
    mesaj += "Sipariş:%0A";

    sepet.forEach(item => {
        mesaj += `- ${item.adet} x ${item.ad}%0A`;
    });

    window.location.href = `https://wa.me/${whatsappNumara}?text=${mesaj}`;
}

urunleriGoster();
sepetiGuncelle();
</script>

</body>
</html>
