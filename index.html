<html lang="tr">
<head>

<title>Eğlence Playstation Menü</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background:
        radial-gradient(circle at top left, rgba(0,234,255,.18), transparent 35%),
        radial-gradient(circle at top right, rgba(150,0,255,.18), transparent 35%),
        #07070d;
    color: white;
    padding-bottom: 105px;
}

header {
    padding: 24px 16px 18px;
    background: linear-gradient(135deg, #050505, #101033);
    border-bottom: 1px solid rgba(0,234,255,.45);
}

header h1 { margin: 0; color: #00eaff; font-size: 24px; }
header p { margin: 7px 0 0; color: #cfcfcf; font-size: 14px; }

.search-box { padding: 12px; }

.search-box input {
    width: 100%;
    padding: 13px 14px;
    border-radius: 15px;
    border: 1px solid rgba(0,234,255,.45);
    background: rgba(255,255,255,.08);
    color: white;
    outline: none;
    font-size: 15px;
}

.category-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 0 12px 12px;
    position: sticky;
    top: 0;
    background: rgba(7,7,13,.95);
    z-index: 5;
}

.tab {
    white-space: nowrap;
    padding: 11px 13px;
    border-radius: 14px;
    border: 1px solid #00eaff;
    background: #151522;
    color: white;
    font-weight: bold;
}

.tab.active {
    background: #00eaff;
    color: #000;
}

.section-title {
    padding: 0 12px;
    margin: 10px 0 4px;
    color: #00eaff;
    font-size: 17px;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    padding: 12px;
}

.card {
    position: relative;
    background: rgba(23,23,36,.88);
    border: 1px solid rgba(0,234,255,.16);
    border-radius: 17px;
    overflow: hidden;
}

.card img {
    width: 100%;
    height: 82px;
    object-fit: contain;
    background: #fff;
    padding: 8px;
}

.card-body { padding: 9px; }

.card h3 {
    margin: 0 0 6px;
    font-size: 13px;
    min-height: 32px;
}

.price {
    color: #00eaff;
    font-weight: bold;
    font-size: 13px;
    margin-bottom: 8px;
}

.card button {
    width: 100%;
    background: #00eaff;
    color: #000;
    border: none;
    padding: 9px;
    border-radius: 10px;
    font-weight: bold;
    font-size: 12px;
}

.qty-badge {
    position: absolute;
    top: 7px;
    right: 7px;
    background: #00eaff;
    color: #000;
    min-width: 26px;
    height: 26px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: bold;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 3;
}

.qty-badge.show { display: flex; }

.bottom-cart {
    position: fixed;
    left: 12px;
    right: 12px;
    bottom: 12px;
    z-index: 20;
    border: none;
    border-radius: 18px;
    padding: 14px 16px;
    background: #24242b;
    color: #888;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.bottom-cart.active {
    background: #00eaff;
    color: #000;
}

.overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.55);
    z-index: 25;
}

.overlay.show { display: block; }

.cart-panel,
.option-panel {
    position: fixed;
    top: 0;
    right: -100%;
    width: 88%;
    max-width: 390px;
    height: 100%;
    background: #080811;
    border-left: 2px solid #00eaff;
    z-index: 30;
    transition: .25s;
    padding: 15px;
    display: flex;
    flex-direction: column;
}

.cart-panel.open,
.option-panel.open { right: 0; }

.panel-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.close-btn {
    background: #222;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 8px 11px;
}

.cart-items,
.option-items {
    flex: 1;
    overflow-y: auto;
    margin: 15px 0;
}

.cart-row {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid #222;
}

.cart-controls {
    display: flex;
    gap: 5px;
}

.cart-controls button {
    width: 30px;
    height: 30px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    background: #1f1f2e;
    color: white;
}

.cart-controls .delete { background: #ff3b3b; }

.option-item {
    display: block;
    padding: 13px;
    margin-bottom: 9px;
    border-radius: 13px;
    background: #151522;
    border: 1px solid #292945;
}

.option-item input { margin-right: 8px; }

.send-btn {
    width: 100%;
    background: #00eaff;
    color: #000;
    border: none;
    padding: 14px;
    border-radius: 13px;
    font-weight: bold;
    font-size: 15px;
}

.send-btn:disabled {
    background: #333;
    color: #888;
}

.clear-btn {
    width: 100%;
    background: #292929;
    color: white;
    border: none;
    padding: 11px;
    border-radius: 13px;
    font-weight: bold;
    margin-top: 8px;
}

.empty { color: #aaa; font-size: 14px; }
</style>
</head>

let aktifKategori = kategoriler[0];
let sepet = [];
let secilenUrun = null;

function kategoriButonlariniGoster() {
    const alan = document.getElementById("kategoriAlani");
    alan.innerHTML = kategoriler.map((kategori, index) => `
        <button class="tab ${index === 0 ? "active" : ""}" onclick="kategoriSec('${kategori}', this)">
            ${kategori}
        </button>
    `).join("");
}

function sepettekiAdet(id) {
    return sepet.filter(item => item.id === id)
        .reduce((toplam, item) => toplam + item.adet, 0);
}

function kartHtml(urun) {
    const adet = sepettekiAdet(urun.id);

    return `
        <div class="card">
            <div class="qty-badge ${adet > 0 ? "show" : ""}">${adet}</div>
            <img src="images/${urun.dosya}.png" alt="${urun.ad}">
            <div class="card-body">
                <h3>${urun.ad}</h3>
                <div class="price">${urun.fiyat} TL</div>
                <button onclick="urunSec(${urun.id})">Ekle</button>
            </div>
        </div>
    `;
}

function urunleriGoster() {
    const arama = document.getElementById("arama").value.toLowerCase();
    const urunAlani = document.getElementById("urunAlani");

    document.getElementById("kategoriBaslik").innerText = aktifKategori;

    const filtreli = urunler.filter(urun =>
        urun.kategori === aktifKategori &&
        urun.ad.toLowerCase().includes(arama)
    );

    urunAlani.innerHTML = filtreli.map(kartHtml).join("");
}

function kategoriSec(kategori, buton) {
    aktifKategori = kategori;

    document.querySelectorAll(".tab").forEach(btn => btn.classList.remove("active"));
    buton.classList.add("active");

    urunleriGoster();
}

function urunSec(id) {
    const urun = urunler.find(item => item.id === id);

    if (urun.secenekler && urun.secenekler.length > 0) {
        secilenUrun = urun;
        document.getElementById("optionTitle").innerText = urun.ad + " seçeneği";
        document.getElementById("optionItems").innerHTML = urun.secenekler.map(secenek => `
            <label class="option-item">
                <input type="radio" name="secenek" value="${secenek}">
                ${secenek}
            </label>
        `).join("");

        document.getElementById("optionPanel").classList.add("open");
        document.getElementById("overlay").classList.add("show");
    } else {
        sepeteEkle(urun);
    }
}

function secenekliSepeteEkle() {
    const secilen = document.querySelector('input[name="secenek"]:checked');

    if (!secilen) {
        alert("Lütfen bir seçenek seçin.");
        return;
    }

    sepeteEkle(secilenUrun, secilen.value);
    panelleriKapat();
}

function sepeteEkle(urun, secenek = "") {
    const anahtar = urun.id + "-" + secenek;
    const mevcut = sepet.find(item => item.anahtar === anahtar);

    if (mevcut) {
        mevcut.adet += 1;
    } else {
        sepet.push({ ...urun, secenek, anahtar, adet: 1 });
    }

    sepetiGuncelle();
    urunleriGoster();
}

function adetArtir(anahtar) {
    const urun = sepet.find(item => item.anahtar === anahtar);
    if (urun) urun.adet += 1;
    sepetiGuncelle();
    urunleriGoster();
}

function adetAzalt(anahtar) {
    const urun = sepet.find(item => item.anahtar === anahtar);
    if (!urun) return;

    urun.adet -= 1;

    if (urun.adet <= 0) {
        sepet = sepet.filter(item => item.anahtar !== anahtar);
    }

    sepetiGuncelle();
    urunleriGoster();
}

function urunSil(anahtar) {
    sepet = sepet.filter(item => item.anahtar !== anahtar);
    sepetiGuncelle();
    urunleriGoster();
}

function sepetiGuncelle() {
    const liste = document.getElementById("sepetListesi");
    const siparisBtn = document.getElementById("siparisBtn");
    const bottomCart = document.getElementById("bottomCart");
    const bottomCartText = document.getElementById("bottomCartText");
    const bottomCartAction = document.getElementById("bottomCartAction");

    const toplamAdet = sepet.reduce((toplam, item) => toplam + item.adet, 0);

    if (sepet.length === 0) {
        liste.innerHTML = '<span class="empty">Sepet boş</span>';
        siparisBtn.disabled = true;
        bottomCart.classList.remove("active");
        bottomCartText.innerText = "🛒 Sepet boş";
        bottomCartAction.innerText = "Ürün seç";
        return;
    }

    liste.innerHTML = sepet.map(item => `
        <div class="cart-row">
            <div>${item.adet} × ${item.ad}${item.secenek ? " (" + item.secenek + ")" : ""}</div>
            <div class="cart-controls">
                <button onclick="adetAzalt('${item.anahtar}')">−</button>
                <button onclick="adetArtir('${item.anahtar}')">+</button>
                <button class="delete" onclick="urunSil('${item.anahtar}')">×</button>
            </div>
        </div>
    `).join("");

    siparisBtn.disabled = false;
    bottomCart.classList.add("active");
    bottomCartText.innerText = `🛒 ${toplamAdet} ürün eklendi`;
    bottomCartAction.innerText = "Sepeti Gör →";
}

function sepetiAc() {
    if (sepet.length === 0) return;
    document.getElementById("cartPanel").classList.add("open");
    document.getElementById("overlay").classList.add("show");
}

function sepetiTemizle() {
    sepet = [];
    sepetiGuncelle();
    urunleriGoster();
}

function panelleriKapat() {
    document.getElementById("cartPanel").classList.remove("open");
    document.getElementById("optionPanel").classList.remove("open");
    document.getElementById("overlay").classList.remove("show");
}

function siparisGonder() {
    if (sepet.length === 0) return;

    let mesaj = "Merhaba, sipariş vermek istiyorum.%0A%0A";
    mesaj += "Sipariş:%0A";

    sepet.forEach(item => {
        mesaj += `- ${item.adet} x ${item.ad}${item.secenek ? " (" + item.secenek + ")" : ""}%0A`;
    });

    window.location.href = `https://wa.me/${whatsappNumara}?text=${mesaj}`;
}

kategoriButonlariniGoster();
urunleriGoster();
sepetiGuncelle();
</script>

</body>
</html>
