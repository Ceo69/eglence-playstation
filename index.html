<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eğlence Playstation Sipariş</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0b12;
    color: white;
    padding-bottom: 130px;
}

header {
    padding: 25px 18px;
    background: linear-gradient(135deg, #050505, #111133);
    border-bottom: 1px solid #2626ff;
}

header h1 {
    margin: 0;
    color: #00eaff;
    font-size: 26px;
}

header p {
    margin: 8px 0 0;
    color: #cfcfcf;
}

.tabs {
    display: flex;
    gap: 10px;
    padding: 15px;
    position: sticky;
    top: 0;
    background: #0b0b12;
    z-index: 5;
}

.tab {
    flex: 1;
    padding: 13px;
    border-radius: 14px;
    border: 1px solid #00eaff;
    background: #151522;
    color: white;
    font-weight: bold;
}

.tab.active {
    background: #00eaff;
    color: #000;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    padding: 15px;
}

.card {
    background: #171724;
    border: 1px solid #26263a;
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 0 12px rgba(0, 234, 255, 0.08);
}

.card img {
    width: 100%;
    height: 80px;
    object-fit: contain;
    background: #fff;
    padding: 10px;
}

.card-body {
    padding: 12px;
}

.card h3 {
    margin: 0 0 6px;
    font-size: 13px;
}

.price {
    color: #00eaff;
    font-weight: bold;
    margin-bottom: 10px;
}

.card button,
.cart button {
    width: 100%;
    background: #00eaff;
    color: #000;
    border: none;
    padding: 9px;
    border-radius: 12px;
    font-weight: bold;
}

.cart {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: #050505;
    border-top: 2px solid #00eaff;
    padding: 14px;
    z-index: 10;
}

.cart-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.cart-items {
    max-height: 90px;
    overflow-y: auto;
    margin: 8px 0;
    color: #ddd;
    font-size: 14px;
}

.small-btn {
    background: #292929 !important;
    color: white !important;
    margin-top: 8px;
}

.empty {
    color: #aaa;
}
</style>
</head>

<body>

<header>
    <h1>🎮 Eğlence Playstation</h1>
    <p>Menüden ürün seç, sepete ekle, WhatsApp ile gönder.</p>
</header>

<div class="tabs">
    <button class="tab active" onclick="kategoriSec('İçecekler', this)">🥤 İçecekler</button>
    <button class="tab" onclick="kategoriSec('Yiyecekler', this)">🍔 Yiyecekler</button>
</div>

<div class="grid" id="urunAlani"></div>

<div class="cart">
    <div class="cart-head">
        <strong>🛒 Sepet</strong>
        <strong><span id="toplam">0</span> TL</strong>
    </div>

    <div class="cart-items" id="sepetListesi">
        <span class="empty">Sepet boş</span>
    </div>

    <button onclick="siparisGonder()">Siparişi Gönder</button>
    <button class="small-btn" onclick="sepetiTemizle()">Sepeti Temizle</button>
</div>

<script>
const whatsappNumara = "905423948645";

const urunler = [
    {
        ad: "Su",
        fiyat: 15,
        kategori: "İçecekler",
        resim: "https://via.placeholder.com/300x200?text=Su"
    },
    {
        ad: "Pepsi Cam Şişe",
        fiyat: 50,
        kategori: "İçecekler",
        resim: "https://via.placeholder.com/300x200?text=Pepsi"
    },
    {
        ad: "Pepsi Kutu",
        fiyat: 50,
        kategori: "İçecekler",
        resim: "images/PEPSİ.png"
    },
    {
        ad: "7UP",
        fiyat: 50,
        kategori: "İçecekler",
        resim: "https://via.placeholder.com/300x200?text=7UP"
    },
    {
        ad: "Yedigün",
        fiyat: 50,
        kategori: "İçecekler",
        resim: "https://via.placeholder.com/300x200?text=Yedigun"
    },
    {
        ad: "Lipton Ice Tea",
        fiyat: 50,
        kategori: "İçecekler",
        resim: "https://via.placeholder.com/300x200?text=Lipton"
    },
    {
        ad: "Tropicana",
        fiyat: 50,
        kategori: "İçecekler",
        resim: "https://via.placeholder.com/300x200?text=Tropicana"
    },
    {
        ad: "Maden Suyu",
        fiyat: 30,
        kategori: "İçecekler",
        resim: "https://via.placeholder.com/300x200?text=Maden+Suyu"
    },
    {
        ad: "Tost",
        fiyat: 100,
        kategori: "Yiyecekler",
        resim: "https://via.placeholder.com/300x200?text=Tost"
    },
    {
        ad: "Sufle",
        fiyat: 100,
        kategori: "Yiyecekler",
        resim: "https://via.placeholder.com/300x200?text=Sufle"
    }
];

let aktifKategori = "İçecekler";
let sepet = [];

function urunleriGoster() {
    const alan = document.getElementById("urunAlani");
    alan.innerHTML = "";

    urunler
        .filter(urun => urun.kategori === aktifKategori)
        .forEach(urun => {
            alan.innerHTML += `
                <div class="card">
                    <img src="${urun.resim}" alt="${urun.ad}">
                    <div class="card-body">
                        <h3>${urun.ad}</h3>
                        <div class="price">${urun.fiyat} TL</div>
                        <button onclick="sepeteEkle('${urun.ad}')">Sepete Ekle</button>
                    </div>
                </div>
            `;
        });
}

function kategoriSec(kategori, buton) {
    aktifKategori = kategori;

    document.querySelectorAll(".tab").forEach(btn => btn.classList.remove("active"));
    buton.classList.add("active");

    urunleriGoster();
}

function sepeteEkle(urunAdi) {
    const urun = urunler.find(item => item.ad === urunAdi);
    const mevcut = sepet.find(item => item.ad === urunAdi);

    if (mevcut) {
        mevcut.adet += 1;
    } else {
        sepet.push({ ...urun, adet: 1 });
    }

    sepetiGuncelle();
}

function sepetiGuncelle() {
    const liste = document.getElementById("sepetListesi");
    const toplamAlan = document.getElementById("toplam");

    if (sepet.length === 0) {
        liste.innerHTML = '<span class="empty">Sepet boş</span>';
        toplamAlan.innerText = 0;
        return;
    }

    let toplam = 0;
    liste.innerHTML = "";

    sepet.forEach(item => {
        toplam += item.fiyat * item.adet;
        liste.innerHTML += `${item.adet} × ${item.ad} - ${item.fiyat * item.adet} TL<br>`;
    });

    toplamAlan.innerText = toplam;
}

function sepetiTemizle() {
    sepet = [];
    sepetiGuncelle();
}

function siparisGonder() {
    if (sepet.length === 0) {
        alert("Sepet boş.");
        return;
    }

    let toplam = 0;
    let mesaj = "Merhaba, sipariş vermek istiyorum.%0A%0A";
    mesaj += "Sipariş:%0A";

    sepet.forEach(item => {
        const araToplam = item.fiyat * item.adet;
        toplam += araToplam;
        mesaj += `- ${item.adet} x ${item.ad} - ${araToplam} TL%0A`;
    });


    window.location.href = `https://wa.me/${whatsappNumara}?text=${mesaj}`;
}

urunleriGoster();
</script>

</body>
</html>
